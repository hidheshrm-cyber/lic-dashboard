<!DOCTYPE html>
<html>
<head>
    <title>LIC Dashboard Login</title>

    <link rel="stylesheet" href="/static/login.css">
</head>
<body>

<div class="container">

    <div id="mother" class="character">
        👩
    </div>

    <div class="login-box">

        <h1>LIC Dashboard</h1>

        <form id="loginForm">

            <input
                type="text"
                id="username"
                placeholder="Username"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <p id="message"></p>

    </div>

    <div id="son" class="character">
        👦
    </div>

</div>

<script src="/static/login.js"></script>

</body>
</html>
